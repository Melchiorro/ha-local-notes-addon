name: Add-on Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Home Assistant Add-on Check
        uses: frenck/action-addon-linter@v2
        with:
          path: "./my-local-notes"
