name: Add-on Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Это официальный валидатор для репозиториев с аддонами
      - name: Home Assistant Add-on Repository Validation
        uses: home-assistant/actions/repository-validator@master
        with:
          repository: ${{ github.repository }}
